# ============================================================================
# Docker Compose — Compliance Automation Platform
# ============================================================================
# Usage:
#   docker compose up --build        (foreground)
#   docker compose up --build -d     (background)
#   docker compose down              (stop)
# ============================================================================

services:
  compliance-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: compliance-orchestrator
    env_file:
      - .env
    environment:
      - LOG_LEVEL=INFO
      - REPORT_OUTPUT_DIR=/app/reports
    volumes:
      - reports:/app/reports
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"

  # ── Project Aegis — Redis (Phase 1) ──────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: aegis_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes      # AOF persistence — survives restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Project Aegis — Qdrant (Phase 3) ─────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegis_qdrant
    ports:
      - "6333:6333"     # REST API
      - "6334:6334"     # gRPC (optional)
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  reports:
    driver: local
  redis_data:
  qdrant_data:
